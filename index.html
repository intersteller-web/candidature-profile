<!DOCTYPE html>
<html>

<head>

<title>Ganga Altus Candidates</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f6fa;
}

/* HEADER */

.header{
background:#5a0f2e;
color:white;
padding:10px 20px;
}

.header-inner{
display:flex;
align-items:center;
}

.header-logo{
width:50px;
margin-right:15px;
}

/* SIDEBAR */

.sidebar{
height:calc(100vh - 120px);
background:white;
border-right:1px solid #ddd;
overflow-y:auto;
}

.candidate-item{
cursor:pointer;
padding:12px;
border-bottom:1px solid #eee;
}

.candidate-item:hover{
background:#eef2ff;
}

.candidate-photo{
width:180px;
height:220px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
}

/* FOOTER */

.footer{
background:#212529;
color:white;
padding:15px;
text-align:center;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="header-inner">

<img src="images/altus.png" class="header-logo">

<h4 class="mb-0">Ganga Altus Candidates</h4>

</div>

</div>


<div class="container-fluid">

<div class="row">

<!-- LEFT PANEL -->

<div class="col-md-3 sidebar">

<h4 class="p-3">Candidates</h4>

<div class="candidate-item" onclick="showCandidate('sandesh')">
Sandesh Garud
</div>

<div class="candidate-item" onclick="showCandidate('ambar')">
Ambar Srivastava
</div>

<div class="candidate-item" onclick="showCandidate('nilesh')">
Nilesh Shete
</div>

<div class="candidate-item" onclick="showCandidate('mahesh')">
Mahesh Gadekar
</div>

<div class="candidate-item" onclick="showCandidate('kartik')">
Kartik Natrajan
</div>

<div class="candidate-item" onclick="showCandidate('amol')">
Amol Shivale
</div>

</div>


<!-- RIGHT PANEL -->

<div class="col-md-9 p-4">

<div id="candidateDetails">

<h3>Select a candidate</h3>
<p>Click a name from the left panel to view details.</p>

</div>

</div>

</div>

</div>


<!-- FOOTER -->

<div class="footer">
Get in touch with us :
</div>


<script>

const candidates = {

function showCandidate(id){

let c = candidates[id]

let workList = ""

c.work.forEach(w=>{
workList += "<li>"+w+"</li>"
})

document.getElementById("candidateDetails").innerHTML = `

<h2>${c.name}</h2>

<img src="${c.photo}" class="candidate-photo">

<h4>Work Done</h4>

<ul>
${workList}
</ul>

<h4>Contribution</h4>

<p>${c.contribution}</p>

<hr>

<h5>Get in touch with ${c.name} for any queries:</h5>

<p>
<strong>
<a href="tel:${c.phone}">
${c.phone}
</a>
</strong>
</p>

`

}
</script>

</body>
</html>
